<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
<div class="logo"><p class="yourlogo">Your Logo</p></div>
<div class="login-page">
    <div class="form">
        <form class="login-form">
            <div class="cols">
                <div class="left">
                    <p class="welcome">Welcome to <a>LOREM</a></p>
                    <p class="sing">Sign in</p>
                </div>
                <div class="right">
                    <p class="message">No Account? </p>
                    <p class="message"><a href="../registration/index.html">Sign up</a></p>
                </div>
            </div>
            <p class="enter">Enter your username or email address</p>
            <input type="text" id="login_email" placeholder="Username or email address"/>
            <p class="enter">Enter your Password</p>
            <input id="login_password" type="password" placeholder="Password"/>
            <button id="sing_in" type="button">Sign in</button>
        </form>
    </div>
</div>
<script type="module" src="../scripts/script.js"></script>
</body>
</html>
