<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
<div class="logo"><p class="yourlogo">Your Logo</p></div>
<div class="login-page">
    <div class="form">
        <form class="register-form">
            <div class="cols">
                <div class="left">
                    <p class="welcome">Welcome to <a>LOREM</a></p>
                    <p class="sing" id="sing-register">Sign up</p>
                </div>
                <div class="right">
                    <p class="message">Have an Account? </p>
                    <p class="message"><a href="../login/index.html">Sign In</a></p>
                </div>
            </div>
            <p class="enter" id="enter-register">Enter your username or email address</p>
            <input type="text" id="register_email" placeholder="Username or email address"/>
            <div class="contact">
                <div class="left-contact">
                    <p class="enter">User name</p>
                    <input class="input-contact" id="name" type="text" placeholder="User name"/>
                </div>
                <div class="right-contact">
                    <p class="enter" id="p-number">Contact Number</p>
                    <input class="input-contact" id="number" type="text" placeholder="Contact Number"/>
                </div>
            </div>
            <p class="enter">Enter your Password</p>
            <input id="register_password" type="password" placeholder="Password"/>
            <button id="sing_up" type="button">Sign up</button>
        </form>
    </div>
</div>
<script type="module" src="../scripts/script.js"></script>
</body>
<script>

</script>
</html>
